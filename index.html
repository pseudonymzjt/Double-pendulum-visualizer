<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Double Pendulum Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas-a"></canvas>
    <canvas id="canvas-b"></canvas>
    <div id="controls">
        <button id="btn-add" title="Add pendulum">+</button>
        <button id="btn-play">⏸ Pause [Space]</button>
        <button id="btn-reset">↺ Reset [R]</button>
        <button id="btn-chaos">⚡ Chaos [C]</button>
        <button id="btn-metrics">📊 Metrics [M]</button>
        <button id="btn-clear">✕ Clear Trail</button>
        <button id="btn-slow">⏱ ½× Slow</button>
        <button id="btn-save">⬇ Save</button>
    </div>
    <div id="angle-display"></div>
    <div id="params-panel">
        <div class="param-row">
            <label>Gravity</label>
            <input type="range" id="param-gravity" min="2" max="25" step="0.1" value="11.0">
            <span class="param-value" id="grav-value">11.0</span>
        </div>
        <div class="param-row">
            <label>Damping</label>
            <input type="range" id="param-damping" min="0" max="0.01" step="0.0001" value="0.0003">
            <span class="param-value" id="damp-value">0.0003</span>
        </div>
        <div class="param-row">
            <label>Speed</label>
            <input type="range" id="param-speed" min="0.2" max="3.0" step="0.1" value="1.0">
            <span class="param-value" id="speed-value">1.0×</span>
        </div>
    </div>
    <div id="ctx-menu">
        <button id="ctx-color" title="Cycle color">🎨</button>
        <button id="ctx-visibility" title="Toggle visibility">◉</button>
        <button id="ctx-add-joint" title="Add joint">＋</button>
        <button id="ctx-rm-joint" title="Remove joint">－</button>
        <button id="ctx-delete" title="Delete this pendulum">✕</button>
    </div>
    <div id="metrics-panel">
        <div class="plot-box">
            <div class="plot-title">Phase Space — θ₁ vs ω₁</div>
            <canvas id="plot-phase"></canvas>
        </div>
        <div class="plot-box">
            <div class="plot-title">Energy — KE / PE / E_total</div>
            <canvas id="plot-energy"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
