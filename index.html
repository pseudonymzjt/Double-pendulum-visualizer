<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Double Pendulum Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas-a"></canvas>
    <canvas id="canvas-b"></canvas>
    <div id="controls">
        <button id="btn-add" title="Add pendulum">+</button>
        <button id="btn-play">⏸ Pause [Space]</button>
        <button id="btn-reset">↺ Reset [R]</button>
        <button id="btn-chaos">⚡ Chaos [C]</button>
        <button id="btn-metrics">📊 Metrics [M]</button>
        <button id="btn-clear">✕ Clear Trail</button>
        <button id="btn-gear" title="Settings">⚙</button>
        <button id="btn-help">📖 Guide</button>
        <button id="btn-lang">中</button>
        <button id="btn-save">⬇ Save</button>
    </div>
    <div id="angle-display"></div>
    <div id="params-panel">
        <div class="param-row">
            <label>Gravity</label>
            <input type="range" id="param-gravity" min="2" max="25" step="0.1" value="11.0">
            <span class="param-value" id="grav-value">11.0</span>
        </div>
        <div class="param-row">
            <label>Damping</label>
            <input type="range" id="param-damping" min="0" max="0.01" step="0.0001" value="0.0003">
            <span class="param-value" id="damp-value">0.0003</span>
        </div>
        <div class="param-row">
            <label>Speed</label>
            <input type="range" id="param-speed" min="0.2" max="3.0" step="0.1" value="1.0">
            <span class="param-value" id="speed-value">1.0×</span>
        </div>
    </div>
    <div id="ctx-menu">
        <button id="ctx-color" title="Cycle color"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 14.7255 3.09032 17.1962 4.85857 19C5.32148 19.4819 6.00486 19.8 6.75 19.8C7.43806 19.8 8.04944 19.4449 8.35825 18.9C8.75 18.2 9.25 18 10 18C10.75 18 11.25 18.2 11.6417 18.9C11.9506 19.4449 12.5619 19.8 13.25 19.8C14.0049 19.8 14.6883 19.4819 15.1512 19M12 22V19.8"/><circle cx="7.5" cy="10.5" r="1" fill="currentColor"/><circle cx="11.5" cy="7.5" r="1" fill="currentColor"/><circle cx="15.5" cy="7.5" r="1" fill="currentColor"/><circle cx="18.5" cy="11.5" r="1" fill="currentColor"/></svg></button>
        <button id="ctx-visibility" title="Toggle visibility"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button id="ctx-add-joint" title="Add joint"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button id="ctx-rm-joint" title="Remove joint"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button id="ctx-delete" title="Delete this pendulum"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
    </div>
    <div id="metrics-panel">
        <div class="plot-box">
            <div class="plot-title">Phase Space — θ₁ vs ω₁</div>
            <canvas id="plot-phase"></canvas>
        </div>
        <div class="plot-box">
            <div class="plot-title">Energy — KE / PE / E_total</div>
            <canvas id="plot-energy"></canvas>
        </div>
    </div>
    <div id="help-modal">
        <div id="help-modal-content">
            <button id="help-close">&times;</button>
            <div id="help-body"></div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
